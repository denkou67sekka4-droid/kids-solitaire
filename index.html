<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ソリティア（配置修正版）</title>
  <style>
    :root{
      --bg:#0b6b3a;
      --bg2:#084d2b;
      --card:#ffffff;
      --card-back:#1c4d8f;
      --slot:rgba(255,255,255,.16);
      --text:#fff;
      --shadow:rgba(0,0,0,.28);
      --red:#c01818;
      --black:#111;
      --accent:#ffd45a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top, var(--bg), var(--bg2));
      min-height:100vh;
      overflow-x:hidden;
      user-select:none;
      touch-action:manipulation;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:10px 12px 6px;
    }
    h1{
      margin:0;
      font-size:20px;
      letter-spacing:.05em;
      font-weight:800;
    }
    .controls{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    button{
      border:0;
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      font-weight:700;
      color:#17351f;
      background:#fff;
      box-shadow:0 2px 5px var(--shadow);
      cursor:pointer;
    }
    button:active{transform:translateY(1px)}
    .stats{
      display:flex;
      gap:10px;
      padding:0 12px 8px;
      font-size:13px;
      opacity:.95;
      flex-wrap:wrap;
    }

    .board{
      width:100%;
      margin:0 auto;
      padding:4px 8px 28px;
      overflow-x:auto;
    }
    .play-area{
      width:min(1000px, 100%);
      min-width:780px;
      margin:0 auto;
    }

    .top{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
      margin-bottom:16px;
    }
    .slot, .pile{
      min-height:112px;
      border-radius:12px;
      background:var(--slot);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.12);
      position:relative;
    }
    [data-pile="stock"]{grid-column:1}
    [data-pile="waste"]{grid-column:2}
    [data-pile="foundation-0"]{grid-column:4}
    [data-pile="foundation-1"]{grid-column:5}
    [data-pile="foundation-2"]{grid-column:6}
    [data-pile="foundation-3"]{grid-column:7}

    .columns{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
      align-items:start;
    }
    .column{
      min-height:320px;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.05);
      position:relative;
      padding-bottom:110px;
    }

    .card{
      width:100%;
      aspect-ratio: 5 / 7;
      border-radius:12px;
      background:var(--card);
      color:var(--black);
      position:absolute;
      box-shadow:0 4px 10px var(--shadow);
      border:2px solid rgba(0,0,0,.2);
      padding:6px;
      font-weight:900;
      cursor:pointer;
      transition:transform .08s ease, box-shadow .08s ease;
      z-index:1;
      overflow:hidden;
    }
    .card.red{color:var(--red)}
    .card.face-down{
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), transparent 18%),
        repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 5px, transparent 5px 10px),
        var(--card-back);
      color:transparent;
      border:2px solid rgba(255,255,255,.32);
    }

    .corner{
      position:absolute;
      left:6px;
      top:6px;
      display:flex;
      flex-direction:column;
      align-items:center;
      line-height:1;
      width:24px;
      z-index:3;
    }
    .corner.bottom{
      left:auto;
      right:6px;
      top:auto;
      bottom:6px;
      transform:rotate(180deg);
    }
    .rank{
      font-size:22px;
      line-height:1;
      font-weight:900;
    }
    .mini-suit{
      font-size:18px;
      line-height:1;
      font-weight:900;
      margin-top:1px;
    }

    .pip-area{
      position:absolute;
      left:18%;
      top:13%;
      width:64%;
      height:74%;
      z-index:1;
    }
    .pip{
      position:absolute;
      transform:translate(-50%, -50%);
      font-size:32px;
      line-height:1;
      font-weight:900;
    }
    .pip.upside{
      transform:translate(-50%, -50%) rotate(180deg);
    }

    .face-area{
      position:absolute;
      left:14%;
      top:16%;
      width:72%;
      height:68%;
      border:2px solid currentColor;
      border-radius:10px;
      z-index:1;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(245,245,245,.95));
    }
    .face-svg{
      width:100%;
      height:100%;
      display:block;
    }

    .selected{
      outline:4px solid var(--accent);
      box-shadow:0 0 0 2px rgba(0,0,0,.2), 0 0 18px rgba(255,212,90,.9);
      transform:translateY(-3px);
    }
    .ghost{
      position:absolute;
      inset:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:900;
      color:rgba(255,255,255,.7);
      pointer-events:none;
    }
    .ghost.text{
      font-size:22px;
      letter-spacing:.08em;
    }

    .message{
      margin:12px auto 0;
      max-width:760px;
      padding:10px 14px;
      border-radius:12px;
      background:rgba(0,0,0,.18);
      text-align:center;
      font-weight:700;
      min-height:42px;
    }
    .hint{
      margin:8px auto 0;
      max-width:760px;
      text-align:center;
      font-size:13px;
      opacity:.9;
    }

    .win{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.45);
      z-index:50;
      padding:20px;
    }
    .win.show{display:grid}
    .win-card{
      width:min(92vw, 420px);
      background:#fff;
      color:#15351f;
      border-radius:18px;
      padding:22px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }
    .win-card h2{margin:0 0 8px;font-size:28px}
    .win-card p{margin:8px 0 16px}
    .win-card button{background:#0b6b3a;color:#fff}

    @media (max-width:820px){
      header{align-items:flex-start}
      h1{font-size:18px}
      button{font-size:13px;padding:7px 10px}
      .top,.columns{gap:8px}
      .slot,.pile{min-height:102px}
      .column{min-height:300px}
      .rank{font-size:21px}
      .mini-suit{font-size:17px}
      .pip{font-size:28px}
      .stats{font-size:12px;gap:8px}
    }
  </style>
</head>
<body>
  <header>
    <h1>ソリティア</h1>
    <div class="controls">
      <button id="newGame">新しく配る</button>
      <button id="drawMode">1枚めくり</button>
      <button id="undo">戻す</button>
    </div>
  </header>

  <div class="stats">
    <div>手数: <span id="moves">0</span></div>
    <div>時間: <span id="time">00:00</span></div>
    <div>勝利数: <span id="wins">0</span></div>
    <div>ベスト: <span id="best">--:--</span></div>
  </div>

  <main class="board">
    <div class="play-area">
      <section class="top">
        <div class="pile slot stock" data-pile="stock"><div class="ghost text">山札</div></div>
        <div class="pile slot waste" data-pile="waste"><div class="ghost text">捨札</div></div>
        <div></div>
        <div class="pile slot foundation" data-pile="foundation-0"><div class="ghost">♠</div></div>
        <div class="pile slot foundation" data-pile="foundation-1"><div class="ghost">♥</div></div>
        <div class="pile slot foundation" data-pile="foundation-2"><div class="ghost">♦</div></div>
        <div class="pile slot foundation" data-pile="foundation-3"><div class="ghost">♣</div></div>
      </section>

      <section class="columns">
        <div class="column pile" data-pile="tableau-0"></div>
        <div class="column pile" data-pile="tableau-1"></div>
        <div class="column pile" data-pile="tableau-2"></div>
        <div class="column pile" data-pile="tableau-3"></div>
        <div class="column pile" data-pile="tableau-4"></div>
        <div class="column pile" data-pile="tableau-5"></div>
        <div class="column pile" data-pile="tableau-6"></div>
      </section>

      <div class="message" id="message">カードをタップして、移動先をタップしてください。</div>
      <div class="hint">数字札は中央に数のぶんだけマークを表示、J・Q・Kは絵札風の表示にしました。</div>
    </div>
  </main>

  <div class="win" id="winOverlay">
    <div class="win-card">
      <h2>クリア！</h2>
      <p id="winText"></p>
      <button id="again">もう一度</button>
    </div>
  </div>

<script>
(() => {
  const suits = ["♠","♥","♦","♣"];
  const colors = {"♠":"black","♣":"black","♥":"red","♦":"red"};
  const rankText = {1:"A",11:"J",12:"Q",13:"K"};
  let state;
  let selected = null;
  let timerId = null;
  let undoStack = [];
  let stats = JSON.parse(localStorage.getItem("solitaireStats") || '{"wins":0,"best":null,"draw":1}');

  const el = {
    moves: document.getElementById("moves"),
    time: document.getElementById("time"),
    wins: document.getElementById("wins"),
    best: document.getElementById("best"),
    message: document.getElementById("message"),
    drawMode: document.getElementById("drawMode"),
    winOverlay: document.getElementById("winOverlay"),
    winText: document.getElementById("winText")
  };

  const pipLayouts = {
    1: [{x:50,y:50,flip:false}],
    2: [{x:50,y:22,flip:false},{x:50,y:78,flip:true}],
    3: [{x:50,y:20,flip:false},{x:50,y:50,flip:false},{x:50,y:80,flip:true}],
    4: [{x:30,y:24,flip:false},{x:70,y:24,flip:false},{x:30,y:76,flip:true},{x:70,y:76,flip:true}],
    5: [{x:30,y:24,flip:false},{x:70,y:24,flip:false},{x:50,y:50,flip:false},{x:30,y:76,flip:true},{x:70,y:76,flip:true}],
    6: [{x:30,y:22,flip:false},{x:70,y:22,flip:false},{x:30,y:50,flip:false},{x:70,y:50,flip:false},{x:30,y:78,flip:true},{x:70,y:78,flip:true}],
    7: [{x:30,y:20,flip:false},{x:70,y:20,flip:false},{x:50,y:36,flip:false},{x:30,y:50,flip:false},{x:70,y:50,flip:false},{x:30,y:80,flip:true},{x:70,y:80,flip:true}],
    8: [{x:30,y:19,flip:false},{x:70,y:19,flip:false},{x:30,y:39,flip:false},{x:70,y:39,flip:false},{x:30,y:61,flip:true},{x:70,y:61,flip:true},{x:30,y:81,flip:true},{x:70,y:81,flip:true}],
    9: [{x:30,y:18,flip:false},{x:70,y:18,flip:false},{x:30,y:36,flip:false},{x:70,y:36,flip:false},{x:50,y:50,flip:false},{x:30,y:64,flip:true},{x:70,y:64,flip:true},{x:30,y:82,flip:true},{x:70,y:82,flip:true}],
    10:[{x:30,y:16,flip:false},{x:70,y:16,flip:false},{x:30,y:32,flip:false},{x:70,y:32,flip:false},{x:50,y:43,flip:false},{x:50,y:57,flip:true},{x:30,y:68,flip:true},{x:70,y:68,flip:true},{x:30,y:84,flip:true},{x:70,y:84,flip:true}]
  };

  function newDeck(){
    const deck = [];
    let id = 0;
    for(const suit of suits){
      for(let rank=1; rank<=13; rank++){
        deck.push({id:id++, suit, rank, color:colors[suit], faceUp:false});
      }
    }
    for(let i=deck.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [deck[i],deck[j]] = [deck[j],deck[i]];
    }
    return deck;
  }

  function newGame(){
    const deck = newDeck();
    state = {
      stock: [],
      waste: [],
      foundations: [[],[],[],[]],
      tableau: [[],[],[],[],[],[],[]],
      moves: 0,
      startedAt: Date.now(),
      elapsedBefore: 0,
      won: false
    };
    for(let col=0; col<7; col++){
      for(let row=0; row<=col; row++){
        const card = deck.pop();
        card.faceUp = row === col;
        state.tableau[col].push(card);
      }
    }
    state.stock = deck;
    undoStack = [];
    selected = null;
    startTimer();
    render();
    msg("カードをタップして、移動先をタップしてください。");
  }

  function saveStats(){
    localStorage.setItem("solitaireStats", JSON.stringify(stats));
  }

  function startTimer(){
    if(timerId) clearInterval(timerId);
    timerId = setInterval(updateTime, 1000);
    updateTime();
  }

  function secondsElapsed(){
    return Math.floor((Date.now() - state.startedAt) / 1000) + state.elapsedBefore;
  }

  function fmt(sec){
    const m = String(Math.floor(sec/60)).padStart(2,"0");
    const s = String(sec%60).padStart(2,"0");
    return `${m}:${s}`;
  }

  function updateTime(){
    if(!state) return;
    el.time.textContent = fmt(secondsElapsed());
  }

  function pileObj(name){
    if(name === "stock") return state.stock;
    if(name === "waste") return state.waste;
    if(name.startsWith("foundation-")) return state.foundations[Number(name.split("-")[1])];
    if(name.startsWith("tableau-")) return state.tableau[Number(name.split("-")[1])];
    return null;
  }

  function cloneState(){
    return JSON.stringify({
      state,
      statsDraw: stats.draw
    });
  }

  function restore(snapshot){
    const data = JSON.parse(snapshot);
    state = data.state;
    stats.draw = data.statsDraw;
    selected = null;
    startTimer();
    render();
  }

  function pushUndo(){
    undoStack.push(cloneState());
    if(undoStack.length > 80) undoStack.shift();
  }

  function rank(card){ return rankText[card.rank] || String(card.rank); }

  function faceArtSVG(card){
    const tone = card.color === "red" ? "#e9b0b0" : "#d7d7d7";
    const accent = card.color === "red" ? "#c01818" : "#333";
    const label = rank(card);
    return `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150">
        <rect x="0" y="0" width="120" height="150" fill="white"/>
        <g transform="translate(60 37)">
          <text x="0" y="-18" text-anchor="middle" font-size="18" font-weight="700" fill="${accent}">${label} ${card.suit}</text>
          <path d="M-22,-8 L-10,-24 L0,-10 L10,-24 L22,-8 L18,0 L-18,0 Z" fill="#f2c54b" stroke="${accent}" stroke-width="2"/>
          <circle cx="0" cy="18" r="18" fill="#f3d5b5" stroke="${accent}" stroke-width="2"/>
          <circle cx="-7" cy="14" r="2.3" fill="${accent}"/>
          <circle cx="7" cy="14" r="2.3" fill="${accent}"/>
          <path d="M-8 24 Q0 30 8 24" fill="none" stroke="${accent}" stroke-width="2" stroke-linecap="round"/>
          <path d="M-18 7 Q0 -7 18 7" fill="${tone}" stroke="${accent}" stroke-width="2"/>
          <path d="M-28 38 Q0 16 28 38 L24 76 L-24 76 Z" fill="${tone}" stroke="${accent}" stroke-width="2"/>
          <text x="0" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="${accent}">${card.suit}</text>
        </g>
        <g transform="translate(60 113) rotate(180)">
          <text x="0" y="-18" text-anchor="middle" font-size="18" font-weight="700" fill="${accent}">${label} ${card.suit}</text>
          <path d="M-22,-8 L-10,-24 L0,-10 L10,-24 L22,-8 L18,0 L-18,0 Z" fill="#f2c54b" stroke="${accent}" stroke-width="2"/>
          <circle cx="0" cy="18" r="18" fill="#f3d5b5" stroke="${accent}" stroke-width="2"/>
          <circle cx="-7" cy="14" r="2.3" fill="${accent}"/>
          <circle cx="7" cy="14" r="2.3" fill="${accent}"/>
          <path d="M-8 24 Q0 30 8 24" fill="none" stroke="${accent}" stroke-width="2" stroke-linecap="round"/>
          <path d="M-18 7 Q0 -7 18 7" fill="${tone}" stroke="${accent}" stroke-width="2"/>
          <path d="M-28 38 Q0 16 28 38 L24 76 L-24 76 Z" fill="${tone}" stroke="${accent}" stroke-width="2"/>
          <text x="0" y="61" text-anchor="middle" font-size="24" font-weight="700" fill="${accent}">${card.suit}</text>
        </g>
      </svg>
    `;
  }

  function buildPipArea(card){
    const area = document.createElement("div");
    area.className = "pip-area";
    const layout = pipLayouts[card.rank] || [];
    for(const pos of layout){
      const pip = document.createElement("div");
      pip.className = "pip" + (pos.flip ? " upside" : "");
      pip.textContent = card.suit;
      pip.style.left = pos.x + "%";
      pip.style.top = pos.y + "%";
      area.appendChild(pip);
    }
    return area;
  }

  function buildFaceArea(card){
    const area = document.createElement("div");
    area.className = "face-area";
    area.innerHTML = faceArtSVG(card);
    return area;
  }

  function cardHTML(card){
    const div = document.createElement("div");
    div.className = "card" + (card.faceUp ? ` ${card.color}` : " face-down");
    div.dataset.cardId = card.id;

    if(card.faceUp){
      const c1 = document.createElement("div");
      c1.className = "corner";
      c1.innerHTML = `<div class="rank">${rank(card)}</div><div class="mini-suit">${card.suit}</div>`;

      const c2 = document.createElement("div");
      c2.className = "corner bottom";
      c2.innerHTML = `<div class="rank">${rank(card)}</div><div class="mini-suit">${card.suit}</div>`;

      div.appendChild(c1);
      div.appendChild(c2);

      if(card.rank >= 11){
        div.appendChild(buildFaceArea(card));
      } else {
        div.appendChild(buildPipArea(card));
      }
    }
    return div;
  }

  function render(){
    document.querySelectorAll(".card").forEach(n => n.remove());

    el.moves.textContent = state.moves;
    el.wins.textContent = stats.wins || 0;
    el.best.textContent = stats.best == null ? "--:--" : fmt(stats.best);
    el.drawMode.textContent = `${stats.draw}枚めくり`;

    renderPile("stock", state.stock, false);
    renderPile("waste", state.waste, true);
    for(let i=0;i<4;i++) renderPile(`foundation-${i}`, state.foundations[i], true);
    for(let i=0;i<7;i++) renderTableau(i);
  }

  function renderPile(name, pile, showTop){
    const container = document.querySelector(`[data-pile="${name}"]`);
    if(!container) return;
    if(name === "stock"){
      if(pile.length){
        const back = cardHTML({id:"stock", faceUp:false});
        back.dataset.action = "draw";
        back.style.inset = "0";
        container.appendChild(back);
      }
      return;
    }
    if(showTop && pile.length){
      const card = pile[pile.length-1];
      const node = cardHTML(card);
      node.dataset.pile = name;
      node.dataset.index = pile.length-1;
      node.style.inset = "0";
      container.appendChild(node);
    }
  }

  function renderTableau(col){
    const container = document.querySelector(`[data-pile="tableau-${col}"]`);
    const pile = state.tableau[col];
    const offset = 36;
    pile.forEach((card, i) => {
      const node = cardHTML(card);
      node.dataset.pile = `tableau-${col}`;
      node.dataset.index = i;
      node.style.top = `${i * offset}px`;
      node.style.left = "0";
      node.style.zIndex = String(i+1);
      container.appendChild(node);
    });
  }

  function msg(t){ el.message.textContent = t; }

  function clearSelection(){
    selected = null;
    document.querySelectorAll(".selected").forEach(n => n.classList.remove("selected"));
  }

  function selectCard(pileName, index, node){
    const pile = pileObj(pileName);
    const card = pile[index];
    if(!card || !card.faceUp) return;
    clearSelection();

    if(pileName.startsWith("tableau-")){
      const moving = pile.slice(index);
      if(!moving.every(c => c.faceUp)) return;
      selected = {from:pileName, index, cards:moving};
      moving.forEach(c => {
        const n = document.querySelector(`[data-card-id="${c.id}"]`);
        if(n) n.classList.add("selected");
      });
    } else {
      selected = {from:pileName, index, cards:[card]};
      node.classList.add("selected");
    }
  }

  function canMoveToTableau(cards, targetPile){
    const first = cards[0];
    const top = targetPile[targetPile.length-1];
    if(!top) return first.rank === 13;
    return top.faceUp && top.color !== first.color && top.rank === first.rank + 1;
  }

  function canMoveToFoundation(card, targetPile){
    if(!targetPile.length) return card.rank === 1;
    const top = targetPile[targetPile.length-1];
    return top.suit === card.suit && card.rank === top.rank + 1;
  }

  function moveSelected(toPileName){
    if(!selected) return false;
    const fromPile = pileObj(selected.from);
    const toPile = pileObj(toPileName);
    if(!fromPile || !toPile || selected.from === toPileName) return false;

    const cards = selected.cards;
    let ok = false;
    if(toPileName.startsWith("tableau-")){
      ok = canMoveToTableau(cards, toPile);
    } else if(toPileName.startsWith("foundation-") && cards.length === 1){
      ok = canMoveToFoundation(cards[0], toPile);
    }
    if(!ok){
      msg("そこには置けません。");
      return false;
    }

    pushUndo();
    fromPile.splice(selected.index, cards.length);
    toPile.push(...cards);
    if(selected.from.startsWith("tableau-") && fromPile.length){
      fromPile[fromPile.length-1].faceUp = true;
    }
    state.moves++;
    clearSelection();
    render();
    checkWin();
    return true;
  }

  function draw(){
    pushUndo();
    if(state.stock.length === 0){
      if(state.waste.length === 0){
        msg("山札も捨て札も空です。");
        undoStack.pop();
        return;
      }
      state.stock = state.waste.reverse().map(c => ({...c, faceUp:false}));
      state.waste = [];
      state.moves++;
      msg("捨て札を山札に戻しました。");
    } else {
      const count = Math.min(stats.draw, state.stock.length);
      for(let i=0;i<count;i++){
        const c = state.stock.pop();
        c.faceUp = true;
        state.waste.push(c);
      }
      state.moves++;
      msg(`${count}枚めくりました。`);
    }
    clearSelection();
    render();
  }

  function autoMove(pileName, index){
    const pile = pileObj(pileName);
    const card = pile && pile[index];
    if(!card || !card.faceUp) return false;
    for(let i=0;i<4;i++){
      if(canMoveToFoundation(card, state.foundations[i])){
        selectCard(pileName, index, document.querySelector(`[data-card-id="${card.id}"]`));
        return moveSelected(`foundation-${i}`);
      }
    }
    return false;
  }

  function checkWin(){
    const total = state.foundations.reduce((a,p)=>a+p.length,0);
    if(total === 52 && !state.won){
      state.won = true;
      const sec = secondsElapsed();
      stats.wins = (stats.wins || 0) + 1;
      if(stats.best == null || sec < stats.best) stats.best = sec;
      saveStats();
      clearInterval(timerId);
      el.winText.textContent = `時間 ${fmt(sec)} / 手数 ${state.moves}`;
      el.winOverlay.classList.add("show");
      render();
    }
  }

  document.addEventListener("click", e => {
    const cardNode = e.target.closest(".card");
    const pileNode = e.target.closest(".pile");

    if(cardNode?.dataset.action === "draw"){
      draw();
      return;
    }

    if(cardNode && cardNode.dataset.pile){
      const pileName = cardNode.dataset.pile;
      const index = Number(cardNode.dataset.index);
      const pile = pileObj(pileName);
      const isTop = index === pile.length - 1;

      if(selected){
        if(pileName.startsWith("foundation-") || pileName.startsWith("tableau-")){
          if(moveSelected(pileName)) return;
        }
        clearSelection();
      }

      if(isTop && pileName !== "stock"){
        if(autoMove(pileName, index)){
          msg("組札へ移動しました。");
          return;
        }
      }
      selectCard(pileName, index, cardNode);
      msg("移動先をタップしてください。");
      return;
    }

    if(pileNode){
      const name = pileNode.dataset.pile;
      if(name === "stock"){
        draw();
        return;
      }
      if(selected){
        moveSelected(name);
      }
    }
  });

  document.getElementById("newGame").addEventListener("click", newGame);
  document.getElementById("again").addEventListener("click", () => {
    el.winOverlay.classList.remove("show");
    newGame();
  });
  document.getElementById("undo").addEventListener("click", () => {
    const snap = undoStack.pop();
    if(!snap){
      msg("戻せる手がありません。");
      return;
    }
    restore(snap);
    msg("1手戻しました。");
  });
  el.drawMode.addEventListener("click", () => {
    stats.draw = stats.draw === 1 ? 3 : 1;
    saveStats();
    render();
    msg(`${stats.draw}枚めくりに変更しました。`);
  });

  newGame();
})();
</script>
</body>
</html>
